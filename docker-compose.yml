services:
  db:
    image: postgres:15
    container_name: vendora-db
    environment:
      POSTGRES_USER: vendora
      POSTGRES_PASSWORD: vendora
      POSTGRES_DB: vendora
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5436:5432"
    volumes:
      - vendora_data_final:/var/lib/postgresql/data

  test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: vendora
      POSTGRES_PASSWORD: vendora
      POSTGRES_DB: vendora_test
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vendora:vendora@db:5432/vendora
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app

volumes:
  vendora_data_final:
