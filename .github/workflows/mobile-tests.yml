name: Mobile — Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_TOKEN: ${{ secrets.EXPO_DEV_ACCESS_TOKEN }}

jobs:
  # ── iPhone smoke tests (Expo web build + Playwright) ──────────────────────
  iphone-smoke:
    name: iPhone Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install deps
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Build Expo web
        working-directory: mobile
        run: npx expo export --platform web

      - name: Install Playwright + browser
        working-directory: mobile
        run: |
          npm install --save-dev @playwright/test serve
          npx playwright install --with-deps chromium

      - name: Run iPhone smoke tests
        working-directory: mobile
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-playwright-report
          path: mobile/playwright-report

  # ── Publish OTA update to preview channel ─────────────────────────────────
  # Only runs on push to main (not PRs), only if smoke tests pass.
  # Cousin's Expo Go picks this up automatically on next app open.
  publish-preview:
    name: Publish OTA → Preview Channel
    runs-on: ubuntu-latest
    needs: iphone-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install deps
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Publish OTA update
        working-directory: mobile
        run: |
          eas update \
            --channel preview \
            --message "ci: ${{ github.sha }}" \
            --non-interactive
