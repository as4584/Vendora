name: Mobile iPhone Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Fast: Expo Web + Playwright with iPhone viewport ──────────────────────
  # Catches white pages, JS crashes, broken navigation.
  # No backend needed — unauthenticated state redirects to login locally.
  iphone-web-smoke:
    name: iPhone Web Smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci

      - name: Build Expo web
        working-directory: mobile
        run: npx expo export --platform web

      - name: Install Playwright + browsers
        working-directory: mobile
        run: |
          npm install --save-dev @playwright/test serve
          npx playwright install --with-deps chromium

      - name: Run iPhone smoke tests
        working-directory: mobile
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-playwright-report
          path: mobile/playwright-report

